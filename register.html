{% extends "base.html" %}
{% block title %}Регистрация — TaskFlow{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">TF</div>
    <div class="auth-sub">Создайте аккаунт, чтобы начать</div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label class="form-label">Имя</label>
        <input class="form-input" type="text" name="name" placeholder="Иван" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input class="form-input" type="text" name="login" placeholder="ivan_99" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-input" type="password" name="password" placeholder="Минимум 6 символов" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full mt1">Создать аккаунт</button>
    </form>

    <div class="auth-link">
      Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
    </div>
  </div>
</div>
{% endblock %}
